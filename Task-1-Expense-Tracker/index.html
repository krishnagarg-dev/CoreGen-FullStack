<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="bg"></div>
<div class="container">
<h1><i class="fa-solid fa-wallet"></i> Expense Tracker</h1>
<div class="cards">
<div class="card"><h3>Balance</h3><h2 id="balance">₹0</h2></div>
<div class="card income"><h3>Income</h3><h2 id="income">₹0</h2></div>
<div class="card expense"><h3>Expense</h3><h2 id="expense">₹0</h2></div>
</div>

<div class="glass">
<form id="form">
<input id="text" placeholder="Description" required>
<input id="amount" type="number" placeholder="Amount" required>
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button>Add Transaction</button>
</form>
</div>

<div class="glass">
<div class="top"><h2>History</h2><button id="clear">Clear All</button></div>
<ul id="list"></ul>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
